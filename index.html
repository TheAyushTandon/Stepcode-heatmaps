<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub & LeetCode Heatmaps</title>
<style>
body{font-family:Arial,sans-serif;background:#0d1117;color:#e6edf3;margin:0;padding:30px}
.container{max-width:1400px;margin:auto}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
input{padding:10px;border-radius:8px;border:1px solid #30363d;background:#161b22;color:white}
button{padding:10px 16px;border:none;border-radius:8px;background:#238636;color:white;cursor:pointer}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px}
.months{display:grid;grid-auto-flow:column;grid-auto-columns:13px;font-size:12px;color:#8b949e;margin-left:30px;margin-bottom:6px}
.heatmap{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,12px);gap:3px}
.cell{width:12px;height:12px;border-radius:2px}
.days{display:grid;grid-template-rows:repeat(7,12px);gap:3px;font-size:11px;color:#8b949e;margin-right:8px}
.wrap{display:flex}
.stats{margin-bottom:12px;font-weight:bold}
.tooltip{position:fixed;background:#21262d;padding:8px;border-radius:6px;display:none;font-size:12px;pointer-events:none}
</style>
</head>
<body>
<div class="container">
<h1>GitHub & LeetCode Heatmaps</h1>

<div class="controls">
<input id="githubUser" placeholder="GitHub Username">
<input id="leetcodeUser" placeholder="LeetCode Username">
<button onclick="loadData()">Generate</button>
</div>

<div class="cards">
<div class="card">
<h2>GitHub</h2>
<div class="stats" id="githubStats"></div>
<div id="githubMonths" class="months"></div>
<div class="wrap">
<div class="days"><span>Mon</span><span></span><span>Wed</span><span></span><span>Fri</span><span></span><span></span></div>
<div id="githubHeatmap" class="heatmap"></div>
</div>
</div>

<div class="card">
<h2>LeetCode</h2>
<div class="stats" id="leetcodeStats"></div>
<div id="leetcodeMonths" class="months"></div>
<div class="wrap">
<div class="days"><span>Mon</span><span></span><span>Wed</span><span></span><span>Fri</span><span></span><span></span></div>
<div id="leetcodeHeatmap" class="heatmap"></div>
</div>
</div>
</div>
</div>

<div id="tooltip" class="tooltip"></div>

<script>
const ghColors=["#161b22","#0e4429","#006d32","#26a641","#39d353"];
const lcColors=["#161b22","#0f5132","#198754","#20c997","#7dffb3"];

function tip(el,text){
 const t=document.getElementById("tooltip");
 el.onmousemove=e=>{
  t.style.display="block";
  t.style.left=e.pageX+10+"px";
  t.style.top=e.pageY+10+"px";
  t.textContent=text;
 };
 el.onmouseleave=()=>t.style.display="none";
}

function renderMonths(container,weeks){
 container.innerHTML="";
 let last="";
 weeks.forEach(w=>{
   const d=new Date(w[0].date);
   const m=d.toLocaleString('default',{month:'short'});
   const span=document.createElement("span");
   span.textContent=m!==last?m:"";
   last=m;
   container.appendChild(span);
 });
}

function renderGithub(data){
 const heat=document.getElementById("githubHeatmap");
 heat.innerHTML="";
 document.getElementById("githubStats").textContent=
   "Total Contributions: "+data.totalContributions;

 renderMonths(
   document.getElementById("githubMonths"),
   data.weeks.map(w=>w.contributionDays)
 );

 data.weeks.forEach(week=>{
   week.contributionDays.forEach(day=>{
      const c=document.createElement("div");
      c.className="cell";

      const levelMap={
        NONE:0,
        FIRST_QUARTILE:1,
        SECOND_QUARTILE:2,
        THIRD_QUARTILE:3,
        FOURTH_QUARTILE:4
      };

      c.style.background=ghColors[levelMap[day.level] ?? 0];
      tip(c,`${day.count} contributions on ${day.date}`);
      heat.appendChild(c);
   });
 });
}

function renderLeetcode(data){
 const heat=document.getElementById("leetcodeHeatmap");
 heat.innerHTML="";

 const map=data.submission_calendar || {};
 let total=0;
 Object.values(map).forEach(v=>total+=Number(v));

 document.getElementById("leetcodeStats").textContent=
   "Total Submissions: "+total;

 const entries=Object.entries(map);

 if(entries.length===0) return;

 const dates=entries.map(([ts,count])=>({
   date:new Date(Number(ts)*1000),
   count:Number(count)
 }));

 const dateMap={};
 let max=0;

 dates.forEach(d=>{
   const key=d.date.toISOString().split("T")[0];
   dateMap[key]=d.count;
   max=Math.max(max,d.count);
 });

 const start=new Date(Math.min(...dates.map(d=>d.date)));
 const end=new Date(Math.max(...dates.map(d=>d.date)));

 const weeks=[];
 let current=[];

 for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)){
    const key=d.toISOString().split("T")[0];
    current.push({
      date:key,
      count:dateMap[key] || 0
    });

    if(current.length===7){
      weeks.push([...current]);
      current=[];
    }
 }

 if(current.length){
   while(current.length<7)
      current.push({date:"",count:0});
   weeks.push(current);
 }

 renderMonths(document.getElementById("leetcodeMonths"),weeks);

 weeks.forEach(week=>{
   week.forEach(day=>{
      const c=document.createElement("div");
      c.className="cell";

      let level=0;
      if(day.count>0){
         const ratio=day.count/max;
         if(ratio<0.25) level=1;
         else if(ratio<0.5) level=2;
         else if(ratio<0.75) level=3;
         else level=4;
      }

      c.style.background=lcColors[level];
      if(day.date)
        tip(c,`${day.count} submissions on ${day.date}`);

      heat.appendChild(c);
   });
 });
}

async function loadData(){
 const gh=document.getElementById("githubUser").value.trim();
 const lc=document.getElementById("leetcodeUser").value.trim();

 if(!gh || !lc){
   alert("Enter both usernames");
   return;
 }

 try{
   const [g,l]=await Promise.all([
      fetch(`/api/github/heatmap/${gh}`),
      fetch(`/api/leetcode/heatmap/${lc}`)
   ]);

   const ghData=await g.json();
   const lcData=await l.json();

   renderGithub(ghData);
   renderLeetcode(lcData);
 }catch(e){
   alert("Failed to fetch data");
   console.error(e);
 }
}
</script>
</body>
</html>
